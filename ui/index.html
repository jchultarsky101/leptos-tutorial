<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ember Trove</title>
    <link data-trunk rel="copy-dir" href="assets" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link data-trunk rel="tailwind-css" href="input.css" />

    <!-- Three.js (ESM) — used for STL 3D model preview -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.175.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.175.0/examples/jsm/"
      }
    }
    </script>
    <script type="module">
      import * as THREE from 'three';
      import { STLLoader } from 'three/addons/loaders/STLLoader.js';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      let _renderer = null;
      let _scene = null;
      let _camera = null;
      let _controls = null;
      let _animId = null;
      let _resizeObs = null;
      let _initCamPos = null;
      let _initCamTarget = null;

      /** Wait until the container has a non-zero size (flex layout resolved). */
      function _waitForSize(el, timeout = 2000) {
        return new Promise((resolve) => {
          if (el.clientWidth > 0 && el.clientHeight > 0) { resolve(); return; }
          const obs = new ResizeObserver(() => {
            if (el.clientWidth > 0 && el.clientHeight > 0) { obs.disconnect(); resolve(); }
          });
          obs.observe(el);
          setTimeout(() => { obs.disconnect(); resolve(); }, timeout);
        });
      }

      window.__stlPreview = {
        async init(container, stlUrl) {
          this.dispose();

          // Wait for the flex layout to resolve so we get a real size.
          await _waitForSize(container);
          const width  = container.clientWidth  || 400;
          const height = container.clientHeight || 400;

          _renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
          _renderer.setSize(width, height);
          _renderer.setPixelRatio(window.devicePixelRatio);
          container.appendChild(_renderer.domElement);

          _renderer.setClearColor(0x000000, 0); // transparent — background driven by CSS
          _scene = new THREE.Scene();

          _camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 10000);

          const ambient = new THREE.AmbientLight(0xffffff, 0.8);
          _scene.add(ambient);
          const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
          dirLight.position.set(1, 2, 3);
          _scene.add(dirLight);
          const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
          dirLight2.position.set(-1, -1, -1);
          _scene.add(dirLight2);
          const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
          fillLight.position.set(0, -1, 2);
          _scene.add(fillLight);

          _controls = new OrbitControls(_camera, _renderer.domElement);
          _controls.enableDamping = true;

          const loader = new STLLoader();
          const geometry = await loader.loadAsync(stlUrl);
          geometry.computeVertexNormals();

          const material = new THREE.MeshPhongMaterial({
            color: 0x9ca3af,
            specular: 0x444444,
            shininess: 60,
          });
          const mesh = new THREE.Mesh(geometry, material);

          // Center the geometry at the origin.
          geometry.computeBoundingBox();
          const center = new THREE.Vector3();
          geometry.boundingBox.getCenter(center);
          geometry.center();

          _scene.add(mesh);

          // Frame the camera to fit the model using its bounding sphere.
          geometry.computeBoundingSphere();
          const radius = geometry.boundingSphere.radius;
          const fovRad = THREE.MathUtils.degToRad(_camera.fov / 2);
          const dist = radius / Math.sin(fovRad) * 1.3; // 1.3x margin
          _camera.position.set(dist * 0.7, dist * 0.5, dist * 0.7);
          _camera.near = dist / 100;
          _camera.far  = dist * 10;
          _camera.updateProjectionMatrix();
          _controls.target.set(0, 0, 0);
          _controls.update();

          // Save initial camera state for resetView.
          _initCamPos = _camera.position.clone();
          _initCamTarget = _controls.target.clone();

          function animate() {
            _animId = requestAnimationFrame(animate);
            _controls.update();
            _renderer.render(_scene, _camera);
          }
          animate();

          _resizeObs = new ResizeObserver(() => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            if (w > 0 && h > 0) {
              _camera.aspect = w / h;
              _camera.updateProjectionMatrix();
              _renderer.setSize(w, h);
            }
          });
          _resizeObs.observe(container);
        },

        dispose() {
          if (_animId != null) { cancelAnimationFrame(_animId); _animId = null; }
          if (_resizeObs) { _resizeObs.disconnect(); _resizeObs = null; }
          if (_controls) { _controls.dispose(); _controls = null; }
          if (_renderer) {
            _renderer.domElement.remove();
            _renderer.dispose();
            _renderer = null;
          }
          if (_scene) {
            _scene.traverse((obj) => {
              if (obj.geometry) obj.geometry.dispose();
              if (obj.material) {
                if (Array.isArray(obj.material)) {
                  obj.material.forEach((m) => m.dispose());
                } else {
                  obj.material.dispose();
                }
              }
            });
            _scene = null;
          }
          _camera = null;
          _initCamPos = null;
          _initCamTarget = null;
        },

        /** Reset camera to the initial framing position. */
        resetView() {
          if (!_camera || !_controls || !_initCamPos) return;
          _camera.position.copy(_initCamPos);
          _controls.target.copy(_initCamTarget);
          _controls.update();
        },

        /** Dolly the camera closer by 20%. */
        zoomIn() {
          if (!_camera || !_controls) return;
          const dir = new THREE.Vector3().subVectors(_controls.target, _camera.position);
          _camera.position.addScaledVector(dir, 0.2);
          _controls.update();
        },

        /** Dolly the camera farther by 20%. */
        zoomOut() {
          if (!_camera || !_controls) return;
          const dir = new THREE.Vector3().subVectors(_controls.target, _camera.position);
          _camera.position.addScaledVector(dir, -0.2);
          _controls.update();
        },

        /** Toggle continuous auto-rotation. Returns the new state. */
        toggleAutoRotate() {
          if (!_controls) return false;
          _controls.autoRotate = !_controls.autoRotate;
          _controls.autoRotateSpeed = 4.0;
          return _controls.autoRotate;
        },
      };
    </script>
  </head>
  <body class="bg-gray-50 text-gray-900 min-h-screen"></body>
</html>
