<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Warm ember aura behind chest -->
  <ellipse cx="16" cy="21" rx="12" ry="8" fill="#FEF3C7" opacity="0.35"/>

  <!-- Chest lid -->
  <rect x="3" y="11" width="26" height="9" rx="4" fill="#D97706"/>
  <!-- Lid surface sheen -->
  <path d="M7 14 Q16 12.5 25 14" stroke="#FDE68A" stroke-width="1.5"
        stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Chest body -->
  <rect x="3" y="20" width="26" height="9" rx="2" fill="#92400E"/>
  <!-- Body decorative band -->
  <rect x="3" y="24" width="26" height="2" fill="#78350F"/>

  <!-- Hinge / metal band at lid–body junction -->
  <rect x="3" y="19" width="26" height="2.5" fill="#B45309"/>

  <!-- Clasp plate -->
  <rect x="13" y="17.5" width="6" height="6" rx="1.5" fill="#F59E0B"/>
  <!-- Clasp keyhole -->
  <circle cx="16" cy="19.8" r="1.4" fill="#78350F"/>
  <rect x="15.35" y="19.8" width="1.3" height="2" rx="0.5" fill="#78350F"/>

  <!-- Ember gem jewel — diamond ornament resting on the lid -->
  <path d="M16 4 L19.5 8.5 L16 12 L12.5 8.5 Z"
        fill="#FBBF24" stroke="#B45309" stroke-width="0.5"/>
  <!-- Bright upper facet -->
  <path d="M16 4 L19.5 8.5 L16 9.5 Z" fill="#FDE68A" opacity="0.9"/>
</svg>
